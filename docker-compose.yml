version: "3"

services:

  api:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      - db

  worker:
    build: .
    command: npm run worker
    depends_on:
      - db

  db:
    image: postgres
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pipeline
    ports:
      - "5433:5432"
    volumes:
      - ./src/db/init.sql:/docker-entrypoint-initdb.d/init.sql